name: Bump build on push to main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-build:
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Bump build number
        run: uv run python scripts/bump_version.py --build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW=$(uv run python scripts/bump_version.py --print)
          git add pyproject.toml src/film_stockpot/__init__.py
          git commit -m "chore: bump build to ${NEW} [skip ci]"
          git push
