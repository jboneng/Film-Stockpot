name: Release Windows

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Create a draft GitHub release
        required: false
        default: false
        type: boolean
      skip_bump:
        description: Skip the post-release minor version bump
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @()
          if ('${{ inputs.draft }}' -eq 'true') { $args += '-Draft' }
          if ('${{ inputs.skip_bump }}' -eq 'true') { $args += '-SkipBump' }
          ./scripts/release_windows.ps1 @args
